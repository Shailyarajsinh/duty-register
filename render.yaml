services:
  - type: web
    name: duty-register
    runtime: node
    plan: free
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install"
    startCommand: "node server/src/index.js"
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disk:
      name: duty-register-data
      mountPath: /var/data
      sizeGB: 1
